<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance - Smart Hostel Attendance</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .kiosk-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            padding: 2rem;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4/3;
            border-radius: 16px;
            overflow: hidden;
            border: 4px solid var(--card-border);
            background: #000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #canvas {
            display: none;
        }

        /* The scanning overlay line */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color), 0 0 20px var(--accent-color);
            opacity: 0.7;
            display: none;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            50% {
                top: 100%;
            }

            100% {
                top: 0;
            }
        }

        /* Result Overlay */
        .result-overlay {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 1rem 2rem;
            border-radius: 999px;
            font-weight: 700;
            font-size: 1.25rem;
            display: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            white-space: nowrap;
            z-index: 10;
        }

        .result-present {
            background: rgba(16, 185, 129, 0.85);
            color: white;
            border: 2px solid var(--success);
        }

        .result-unknown {
            background: rgba(239, 68, 68, 0.85);
            color: white;
            border: 2px solid var(--danger);
        }

        .result-curfew {
            background: rgba(245, 158, 11, 0.85);
            color: white;
            border: 2px solid var(--warning);
        }

        .controls {
            display: flex;
            gap: 1rem;
            width: 100%;
            max-width: 400px;
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="header">
            <div>
                <h2>Smart Hostel</h2>
                <p>Curfew Attendance System</p>
            </div>
            <nav class="nav-links">
                <a href="register.html">Register</a>
                <a href="attendance.html" class="active">Attendance Kiosk</a>
                <a href="mobile.html">Mobile Check-in</a>
                <a href="dashboard.html">Dashboard</a>
                <div id="logout-container"></div>
            </nav>
        </header>

        <main class="animate-fade-in">
            <div class="glass kiosk-container">
                <h1 style="margin-bottom: 0.5rem;">Floor Attendance Kiosk</h1>
                <p style="margin-bottom: 2rem;">Stand in front of the camera to mark your attendance.</p>

                <div class="video-wrapper">
                    <video id="video" autoplay playsinline></video>
                    <canvas id="canvas"></canvas>
                    <div class="scan-line" id="scan-line"></div>
                    <div class="result-overlay" id="result-overlay"></div>
                </div>

                <div class="controls">
                    <button id="scan-btn" class="btn btn-primary"
                        style="width: 100%; font-size: 1.2rem; padding: 1rem;">
                        <i class="fas fa-user-check"></i> Mark Attendance
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- AUTH CHECK FOR LOGOUT ---
        const token = localStorage.getItem('admin_token');
        if (token) {
            document.getElementById('logout-container').innerHTML = `
                <button onclick="logout()" class="btn btn-outline" style="padding: 0.5rem 1rem; margin-left: 1rem; border-color: var(--danger); color: var(--danger);">Logout</button>
            `;
        }

        function logout() {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
            window.location.reload();
        }

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const scanBtn = document.getElementById('scan-btn');
        const scanLine = document.getElementById('scan-line');
        const resultOverlay = document.getElementById('result-overlay');

        // Initialize webcam
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error accessing camera:", err);
                showOverlay("ERROR: Camera Access Denied", "result-unknown");
            }
        }

        initCamera();

        function showOverlay(message, className) {
            resultOverlay.textContent = message;
            resultOverlay.className = `result-overlay ${className}`;
            resultOverlay.style.display = 'block';

            // Hide after 3 seconds
            setTimeout(() => {
                resultOverlay.style.display = 'none';
            }, 3000);
        }

        scanBtn.addEventListener('click', async () => {
            // UI state
            scanBtn.disabled = true;
            scanLine.style.display = 'block';
            resultOverlay.style.display = 'none';

            // Capture frame
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append("image", blob, "scan.jpg");

                try {
                    const response = await fetch("http://localhost:8000/attendance", {
                        method: "POST",
                        body: formData
                    });

                    const data = await response.json();

                    if (data.status === "Present") {
                        showOverlay(`PRESENT: ${data.name.toUpperCase()}`, "result-present");
                    } else if (data.status === "Unknown") {
                        showOverlay("UNRECOGNIZED IDENTITY", "result-unknown");
                    } else if (data.status === "No face detected") {
                        showOverlay("NO FACE DETECTED", "result-curfew");
                    } else {
                        // e.g. Outside curfew window
                        showOverlay(data.status.toUpperCase(), "result-curfew");
                    }
                } catch (err) {
                    console.error(err);
                    showOverlay("ERROR: Server Communication Failed", "result-unknown");
                } finally {
                    scanBtn.disabled = false;
                    scanLine.style.display = 'none';
                }
            }, 'image/jpeg');
        });
    </script>
</body>

</html>
