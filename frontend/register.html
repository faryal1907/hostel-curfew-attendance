<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Hostel Attendance</title>
    <link rel="stylesheet" href="index.css?v=1.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .register-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            max-width: 900px;
            margin: 0 auto;
        }

        .camera-section {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        #video-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 2px solid var(--card-border);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); /* Mirror effect */
        }

        #canvas {
            display: none;
        }

        #preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(-1);
        }

        .form-section {
            padding: 2rem;
        }
        
        #status-message {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
            text-align: center;
            font-weight: 600;
        }
        
        .status-success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: block !important;
        }
        
        .status-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: block !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div>
                <h2>Smart Hostel</h2>
                <p>Curfew Attendance System</p>
            </div>
            <nav class="nav-links">
                <a href="register.html" class="active">Register</a>
                <a href="attendance.html">Attendance Kiosk</a>
                <a href="mobile.html">Mobile Check-in</a>
                <a href="dashboard.html">Dashboard</a>
                <button onclick="logout()" class="btn btn-outline" style="padding: 0.5rem 1rem; margin-left: 1rem; border-color: var(--danger); color: var(--danger);">Logout</button>
            </nav>
        </header>

        <main class="animate-fade-in">
            <h1 style="text-align: center; margin-bottom: 2rem;">Student Registration</h1>
            
            <div class="glass register-container">
                <div class="form-section">
                    <h3>Personal Details</h3>
                    <p style="margin-bottom: 1.5rem;">Enter student information below.</p>
                    
                    <form id="register-form">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label for="roll_no">CMS ID (6 digits)</label>
                            <input type="text" id="roll_no" name="roll_no" pattern="\d{6}" maxlength="6" required placeholder="123456">
                        </div>
                        <div class="form-group">
                            <label for="hostel_name">Hostel Name</label>
                            <select id="hostel_name" name="hostel_name" required>
                                <option value="" disabled selected>Select Hostel</option>
                                <option value="amna">Amna</option>
                                <option value="ayesha">Ayesha</option>
                                <option value="khadija">Khadija</option>
                                <option value="zainab">Zainab</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="room_no">Room Number (3 digits)</label>
                            <input type="text" id="room_no" name="room_no" pattern="\d{3}" maxlength="3" required placeholder="101">
                        </div>
                    </form>
                </div>

                <div class="camera-section form-section">
                    <h3>Face Capture</h3>
                    <p style="margin-bottom: 0.5rem;">Look straight into the camera.</p>
                    
                    <div id="video-container">
                        <video id="video" autoplay playsinline></video>
                        <img id="preview-img" alt="Captured face">
                        <canvas id="canvas"></canvas>
                    </div>

                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <button type="button" id="capture-btn" class="btn btn-outline" style="flex: 1;">
                            <i class="fas fa-camera"></i> Capture Identity
                        </button>
                        <button type="button" id="retake-btn" class="btn btn-outline" style="flex: 1; display: none;">
                            <i class="fas fa-redo"></i> Reset
                        </button>
                    </div>

                    <button type="button" id="submit-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem;" disabled>
                        Register Student
                    </button>
                    
                    <div id="status-message"></div>
                </div>
            </div>
        </main>
    </div>

    <script>
        // --- AUTH GUARD ---
        const token = localStorage.getItem('admin_token');
        console.log("DEBUG: Admin Token found in localStorage:", token);

        if (!token) {
            window.location.href = 'admin_login.html';
        }

        function logout() {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
            window.location.href = 'admin_login.html';
        }

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const previewImg = document.getElementById('preview-img');
        const captureBtn = document.getElementById('capture-btn');
        const retakeBtn = document.getElementById('retake-btn');
        const submitBtn = document.getElementById('submit-btn');
        const form = document.getElementById('register-form');
        const statusMessage = document.getElementById('status-message');

        let capturedBlob = null;

        // Initialize webcam
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error accessing camera:", err);
                statusMessage.textContent = "Error accessing camera. Please allow permissions.";
                statusMessage.className = "status-error";
            }
        }

        initCamera();

        // Capture photo
        captureBtn.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Convert to blob
            canvas.toBlob((blob) => {
                capturedBlob = blob;
                const url = URL.createObjectURL(blob);
                previewImg.src = url;
                
                // Update UI
                video.style.display = 'none';
                previewImg.style.display = 'block';
                captureBtn.style.display = 'none';
                retakeBtn.style.display = 'block';
                submitBtn.disabled = false;
            }, 'image/jpeg');
        });

        // Retake photo
        retakeBtn.addEventListener('click', () => {
            capturedBlob = null;
            video.style.display = 'block';
            previewImg.style.display = 'none';
            captureBtn.style.display = 'block';
            retakeBtn.style.display = 'none';
            submitBtn.disabled = true;
        });

        // Submit form
        submitBtn.addEventListener('click', async () => {
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            if (!capturedBlob) {
                alert("Please capture a photo first.");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = "Processing...";
            statusMessage.className = "";
            statusMessage.style.display = "none";

            const formData = new FormData();
            formData.append("name", document.getElementById('name').value);
            formData.append("roll_no", document.getElementById('roll_no').value);
            formData.append("hostel_name", document.getElementById('hostel_name').value);
            formData.append("room_no", document.getElementById('room_no').value);
            formData.append("image", capturedBlob, "face.jpg");

            try {
                const response = await fetch("http://localhost:8000/register", {
                    method: "POST",
                    headers: { 'X-Admin-Token': token },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    statusMessage.textContent = "SUCCESS: Student Successfully Registered";
                    statusMessage.className = "status-success";
                    form.reset();
                    retakeBtn.click(); // Reset camera
                } else {
                    statusMessage.textContent = "ERROR: " + (data.detail || "Registration failed");
                    statusMessage.className = "status-error";
                }
            } catch (err) {
                console.error(err);
                statusMessage.textContent = "ERROR: Connection failed. Is the backend running?";
                statusMessage.className = "status-error";
            } finally {
                submitBtn.innerHTML = "Register Student";
                if(capturedBlob) submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
