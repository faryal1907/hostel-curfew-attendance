<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Attendance - Smart Hostel</title>
    <link rel="stylesheet" href="index.css?v=1.1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .mobile-container {
            max-width: 400px;
            margin: 2rem auto;
            text-align: center;
        }

        .gps-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        #status-message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
            font-weight: 600;
        }

        .status-success {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: block !important;
        }

        .status-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: block !important;
        }

        #video-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            border: 2px solid var(--card-border);
            margin-bottom: 1rem;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #canvas {
            display: none;
        }

        #preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            transform: scaleX(-1);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div>
                <h2>Smart Hostel</h2>
                <p>Curfew Attendance System</p>
            </div>
            <nav class="nav-links">
                <a href="register.html">Register</a>
                <a href="attendance.html">Kiosk</a>
                <a href="mobile.html" class="active">Mobile Check-in</a>
                <a href="dashboard.html">Dashboard</a>
                <div id="logout-container"></div>
            </nav>
        </header>

        <main class="animate-fade-in mobile-container">
            <div class="glass" style="padding: 2rem;">
                <div class="gps-icon"><i class="fas fa-map-marked-alt"></i></div>
                <h2 style="margin-bottom: 0.5rem;">GPS Attendance</h2>
                <p style="margin-bottom: 2rem;">Mark attendance using your phone's location.</p>
                
                <form id="mobile-form" style="text-align: left;">
                    <div id="video-container">
                        <video id="video" autoplay playsinline></video>
                        <img id="preview-img" alt="Selfie preview">
                        <canvas id="canvas"></canvas>
                    </div>

                    <button type="button" id="capture-btn" class="btn btn-outline" style="width: 100%; margin-bottom: 1rem;">
                        <i class="fas fa-camera"></i> Capture Face
                    </button>
                    <button type="button" id="retake-btn" class="btn btn-outline" style="width: 100%; margin-bottom: 1rem; display: none;">
                        <i class="fas fa-redo"></i> Recapture
                    </button>

                    <div class="form-group">
                        <label for="roll_no">CMS ID (6 digits)</label>
                        <input type="text" id="roll_no" name="roll_no" pattern="\d{6}" maxlength="6" required placeholder="123456">
                    </div>

                    <button type="button" id="checkin-btn" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem; font-size: 1.1rem;" disabled>
                        Mark Location Attendance
                    </button>
                </form>

                <div id="status-message"></div>
            </div>
        </main>
    </div>

    <script>
        // --- AUTH CHECK FOR LOGOUT ---
        const adminToken = localStorage.getItem('admin_token');
        if (adminToken) {
            document.getElementById('logout-container').innerHTML = `
                <button onclick="logout()" class="btn btn-outline" style="padding: 0.5rem 1rem; margin-left: 1rem; border-color: var(--danger); color: var(--danger);">Logout</button>
            `;
        }

        function logout() {
            localStorage.removeItem('admin_token');
            localStorage.removeItem('admin_user');
            window.location.reload();
        }

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const previewImg = document.getElementById('preview-img');
        const captureBtn = document.getElementById('capture-btn');
        const retakeBtn = document.getElementById('retake-btn');
        const checkinBtn = document.getElementById('checkin-btn');
        const form = document.getElementById('mobile-form');
        const statusMessage = document.getElementById('status-message');

        let capturedBlob = null;

        // Initialize webcam
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error accessing camera:", err);
                statusMessage.textContent = "Error accessing camera. Please allow permissions.";
                statusMessage.className = "status-error";
            }
        }

        initCamera();

        // Capture photo
        captureBtn.addEventListener('click', () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob((blob) => {
                capturedBlob = blob;
                const url = URL.createObjectURL(blob);
                previewImg.src = url;
                
                video.style.display = 'none';
                previewImg.style.display = 'block';
                captureBtn.style.display = 'none';
                retakeBtn.style.display = 'block';
                checkinBtn.disabled = false;
            }, 'image/jpeg');
        });

        // Retake photo
        retakeBtn.addEventListener('click', () => {
            capturedBlob = null;
            video.style.display = 'block';
            previewImg.style.display = 'none';
            captureBtn.style.display = 'block';
            retakeBtn.style.display = 'none';
            checkinBtn.disabled = true;
        });

        function showStatus(msg, isSuccess) {
            statusMessage.innerHTML = msg;
            statusMessage.className = isSuccess ? 'status-success' : 'status-error';
        }

        checkinBtn.addEventListener('click', () => {
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            if (!capturedBlob) {
                alert("Please take a selfie first.");
                return;
            }

            const rollNo = document.getElementById('roll_no').value;

            checkinBtn.disabled = true;
            checkinBtn.innerHTML = "Verifying Location & Identity...";
            statusMessage.style.display = "none";

            if (!navigator.geolocation) {
                showStatus("Geolocation is not supported by your browser", false);
                resetBtn();
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    const formData = new FormData();
                    formData.append("roll_no", rollNo);
                    formData.append("lat", lat);
                    formData.append("lng", lng);
                    formData.append("image", capturedBlob, "selfie.jpg");

                    try {
                        const response = await fetch("http://localhost:8000/mobile-attendance", {
                            method: "POST",
                            body: formData
                        });

                        const data = await response.json();

                        if (data.status === "success") {
                            showStatus(`SUCCESS: ${data.message}`, true);
                        } else {
                            showStatus(`DENIED: ${data.message}`, false);
                        }
                    } catch (err) {
                        console.error(err);
                        showStatus("ERROR: Connection failed. Is the backend running?", false);
                    } finally {
                        resetBtn();
                    }
                },
                (error) => {
                    let msg = "Failed to get location.";
                    if(error.code === 1) msg = "Please allow location access to mark attendance.";
                    showStatus("ERROR: " + msg, false);
                    resetBtn();
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        });

        function resetBtn() {
            checkinBtn.disabled = false;
            checkinBtn.innerHTML = "Mark Location Attendance";
        }
    </script>
</body>
</html>
