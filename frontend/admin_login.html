<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Smart Hostel</title>
    <link rel="stylesheet" href="index.css?v=1.1">
    <style>
        .login-container {
            max-width: 400px;
            margin: 4rem auto;
            text-align: center;
        }
        .login-box {
            padding: 2.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <div>
                <h2>Smart Hostel</h2>
                <p>Admin Portal</p>
            </div>
            <nav class="nav-links">
                <a href="register.html">Register</a>
                <a href="attendance.html">Kiosk</a>
                <a href="mobile.html">Mobile Check-in</a>
                <a href="dashboard.html">Dashboard</a>
            </nav>
        </header>

        <main class="animate-fade-in login-container">
            <div class="glass login-box">
                <h2 style="margin-bottom: 0.5rem;">Manager Login</h2>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">Authorized Personnel Only</p>
                
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required placeholder="Enter username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter password">
                    </div>
                    
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem;">
                        Sign In
                    </button>
                </form>
                

                
                <div id="status-msg" style="margin-top: 1rem; padding: 0.75rem; border-radius: 8px; display: none;"></div>
            </div>
        </main>
    </div>

    <script>
        const form = document.getElementById('login-form');
        const statusMsg = document.getElementById('status-msg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(form);
            
            try {
                const response = await fetch('http://localhost:8000/admin/login', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('admin_token', data.token);
                    localStorage.setItem('admin_user', data.username);
                    statusMsg.style.display = 'block';
                    statusMsg.style.backgroundColor = 'rgba(16, 185, 129, 0.1)';
                    statusMsg.style.color = 'var(--success)';
                    statusMsg.textContent = 'Login successful! Redirecting...';
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    statusMsg.style.display = 'block';
                    statusMsg.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
                    statusMsg.style.color = 'var(--danger)';
                    statusMsg.textContent = data.detail || 'Login failed';
                }
            } catch (err) {
                console.error(err);
                alert('Connection error');
            }
        });
    </script>
</body>
</html>
